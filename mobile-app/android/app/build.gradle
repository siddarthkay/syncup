apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// Reproducibility: React Native's gradle plugin injects the build host's LAN IP
androidComponents {
    finalizeDsl { ext ->
        ext.defaultConfig.resValue("string", "react_native_dev_server_ip", "localhost")
    }
}

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()

react {
    entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"].execute(null, rootDir).text.trim())
    reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
    hermesCommand = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/sdks/hermesc/%OS-BIN%/hermesc"
    codegenDir = new File(["node", "--print", "require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()

    enableBundleCompression = (findProperty('android.enableBundleCompression') ?: false).toBoolean()
    cliFile = new File(["node", "--print", "require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })"].execute(null, rootDir).text.trim())
    bundleCommand = "export:embed"

    autolinkLibrariesWithApp()
}

def enableMinifyInReleaseBuilds = (findProperty('android.enableMinifyInReleaseBuilds') ?: false).toBoolean()
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion

    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace 'com.siddarthkay.syncup'
    defaultConfig {
        applicationId 'com.siddarthkay.syncup'
        // PR builds pass -PapplicationIdSuffix=.pr so the APK can sit alongside prod.
        applicationIdSuffix findProperty('applicationIdSuffix') ?: ''
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode Integer.valueOf(providers.environmentVariable("FDROID_VERSION_CODE").getOrElse(String.valueOf(System.currentTimeMillis().intdiv(60000))))
        versionName ((findProperty('VERSION_NAME') ?: '').isEmpty() ? '1.0.0' : findProperty('VERSION_NAME'))

        buildConfigField "String", "REACT_NATIVE_RELEASE_LEVEL", "\"${findProperty('reactNativeReleaseLevel') ?: 'stable'}\""
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        if (System.getenv("RELEASE_KEYSTORE_PATH")) {
            release {
                storeFile file(System.getenv("RELEASE_KEYSTORE_PATH"))
                storePassword System.getenv("RELEASE_KEYSTORE_PASSWORD")
                keyAlias System.getenv("RELEASE_KEY_ALIAS")
                keyPassword System.getenv("RELEASE_KEY_PASSWORD")
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.findByName('release') ?: signingConfigs.debug
            def enableShrinkResources = findProperty('android.enableShrinkResourcesInReleaseBuilds') ?: 'false'
            shrinkResources enableShrinkResources.toBoolean()
            minifyEnabled enableMinifyInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            def enablePngCrunchInRelease = findProperty('android.enablePngCrunchInReleaseBuilds') ?: 'true'
            crunchPngs enablePngCrunchInRelease.toBoolean()
            // Reproducibility: AGP 8.3+ bakes git commit info into the APK by
            // default. Strip it so the APK doesn't depend on the git clone state.
            vcsInfo.include = false
        }
    }

    // (documented cause of F-Droid classes*.dex diffs, see
    // https://f-droid.org/docs/Reproducible_Builds/).
    compileOptions {
        // sourceCompatibility/targetCompatibility come from RN plugin defaults.
    }
    packagingOptions {
        jniLibs {
            def enableLegacyPackaging = findProperty('expo.useLegacyPackaging') ?: 'false'
            useLegacyPackaging enableLegacyPackaging.toBoolean()
        }
    }
    androidResources {
        ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
    }
    dependenciesInfo {
        includeInApk = false
        includeInBundle = false
    }
}

// explicitly pinning '-parameters' eliminates the classes*.dex annotation diff.
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs.add('-parameters')
}

// We don't ship startup profiles and dont need it, they also produce
// non-deterministic assets/dexopt/baseline.prof keyed on dex class offsets 
tasks.whenTaskAdded { task ->
    if (task.name.contains('ArtProfile')) {
        task.enabled = false
    }
}

["pickFirsts", "excludes", "merges", "doNotStrip"].each { prop ->
    def options = (findProperty("android.packagingOptions.$prop") ?: "").split(",");
    for (i in 0..<options.size()) options[i] = options[i].trim();
    options -= ""

    if (options.length > 0) {
        println "android.packagingOptions.$prop += $options ($options.length)"
        options.each {
            android.packagingOptions[prop] += it
        }
    }
}

configurations.all {
    exclude group: 'com.google.mlkit', module: 'barcode-scanning'
    exclude group: 'com.google.mlkit', module: 'vision-common'
    exclude group: 'com.google.mlkit', module: 'common'
    exclude group: 'com.google.android.gms', module: 'play-services-code-scanner'
    exclude group: 'com.google.android.gms', module: 'play-services-tasks'
    exclude group: 'com.google.android.gms', module: 'play-services-base'
    exclude group: 'androidx.camera', module: 'camera-mlkit-vision'
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation files('libs/gobridge.aar')
    implementation "com.google.zxing:core:3.5.3"
    def camerax_version = "1.5.0-rc01"
    implementation "androidx.camera:camera-core:${camerax_version}"
    implementation "androidx.camera:camera-camera2:${camerax_version}"
    implementation "androidx.camera:camera-lifecycle:${camerax_version}"
    implementation "androidx.camera:camera-view:${camerax_version}"
    implementation "com.google.guava:guava:33.1.0-android"

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true";
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true";
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true";

    if (isGifEnabled) {
        implementation("com.facebook.fresco:animated-gif:${expoLibs.versions.fresco.get()}")
    }

    if (isWebpEnabled) {
        implementation("com.facebook.fresco:webpsupport:${expoLibs.versions.fresco.get()}")
        if (isWebpAnimatedEnabled) {
            implementation("com.facebook.fresco:animated-webp:${expoLibs.versions.fresco.get()}")
        }
    }

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    testImplementation("junit:junit:4.13.2")
}
