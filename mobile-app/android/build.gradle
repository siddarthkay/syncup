buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}


subprojects {
  afterEvaluate { project ->
    if (project.hasProperty('android') && project.android?.defaultConfig?.externalNativeBuild?.cmake != null) {
      def cmakeDsl = project.android.defaultConfig.externalNativeBuild.cmake
      cmakeDsl.cppFlags += [
        "-ffile-prefix-map=${System.getProperty('user.home')}=.",
      ]
      // for Fdroid reproducibility 
      cmakeDsl.arguments += [
        "-DCMAKE_SHARED_LINKER_FLAGS=-Wl,--build-id=none",
      ]
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
