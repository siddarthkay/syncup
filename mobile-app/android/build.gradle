buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

// Reproducibility: clang embeds absolute header paths from prefab include dirs into .so files via __FILE__.
// Normalize $HOME across build environments so F-Droid's home and CI's home produce identical bytes.
subprojects {
  afterEvaluate { project ->
    if (project.hasProperty('android') && project.android?.defaultConfig?.externalNativeBuild?.cmake != null) {
      project.android.defaultConfig.externalNativeBuild.cmake.cppFlags += [
        "-ffile-prefix-map=${System.getProperty('user.home')}=.",
      ]
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
