name: release-android

on:
  push:
    branches: ['release/*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: lint + typecheck + go vet
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Lint and typecheck
        run: |
          cd mobile-app && yarn install --immutable && yarn lint && yarn typecheck
          cd ../backend && go vet -tags noassets ./...

  build-apk:
    name: build ${{ matrix.abi }}
    runs-on: [self-hosted, linux]
    needs: lint-and-typecheck
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            gomobile_target: android/arm64
          - abi: x86_64
            gomobile_target: android/amd64
    steps:
      - uses: actions/checkout@v4

      # Nix (via flake.nix) provides Go, Node/corepack, JDK, Gradle, gomobile.
      # Android SDK/NDK are not in the flake — install them here.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-36 build-tools;36.0.0 ndk;26.1.10909125'

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore

      - name: Build release APK (${{ matrix.abi }})
        run: |
          make release-android \
            ANDROID_TARGETS=${{ matrix.gomobile_target }} \
            ANDROID_ABI=${{ matrix.abi }}
        env:
          RELEASE_KEYSTORE_PATH: /tmp/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.abi }}
          path: mobile-app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 1

  release:
    name: create github release
    runs-on: ubuntu-latest
    needs: build-apk
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          path: apks

      - name: Rename APKs by ABI
        run: |
          mv apks/apk-arm64-v8a/app-release.apk apks/syncup-${{ steps.version.outputs.version }}-arm64-v8a.apk
          mv apks/apk-x86_64/app-release.apk    apks/syncup-${{ steps.version.outputs.version }}-x86_64.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: apks/syncup-*.apk
