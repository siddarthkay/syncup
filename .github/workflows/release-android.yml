name: release-android

on:
  pull_request:
    types: [closed]
    branches: [master, main]
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: lint + typecheck + go vet
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Lint and typecheck
        run: |
          cd mobile-app && yarn install --immutable && yarn lint && yarn typecheck
          cd ../backend && go vet -tags noassets ./...

  build-apk:
    name: build ${{ matrix.abi }}
    runs-on: [self-hosted, linux]
    needs: lint-and-typecheck
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            gomobile_target: android/arm64
          - abi: x86_64
            gomobile_target: android/amd64
    steps:
      - uses: actions/checkout@v4

      # Nix (via flake.nix) provides Go, Node/corepack, JDK, Gradle, gomobile.
      # Android SDK/NDK are not in the flake — install them here.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-36 build-tools;36.0.0 ndk;26.3.11579264'

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore

      # Mirror the F-Droid prebuild so the APK is reproducible for them
      - name: Install deps + patch node_modules
        run: |
          make setup
          make patch-node-modules

      - name: Build release APK (${{ matrix.abi }})
        run: |
          make release-android \
            ANDROID_TARGETS=${{ matrix.gomobile_target }} \
            ANDROID_ABI=${{ matrix.abi }}
        env:
          RELEASE_KEYSTORE_PATH: /tmp/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Extract versionCode
        if: matrix.abi == 'arm64-v8a'
        run: |
          AAPT2=$ANDROID_HOME/build-tools/36.0.0/aapt2
          APK=mobile-app/android/app/build/outputs/apk/release/app-release.apk
          VC=$("$AAPT2" dump badging "$APK" | grep -oE "versionCode='[0-9]+'" | grep -oE "[0-9]+")
          echo "arm64-v8a versionCode: $VC"
          echo "$VC" > VERSIONCODE

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.abi }}
          path: mobile-app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 1

      - name: Upload versionCode
        if: matrix.abi == 'arm64-v8a'
        uses: actions/upload-artifact@v4
        with:
          name: versioncode
          path: VERSIONCODE
          if-no-files-found: error
          retention-days: 1

  release:
    name: create github release
    runs-on: ubuntu-latest
    needs: build-apk
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          path: apks

      - name: Rename APKs by ABI + stage VERSIONCODE
        id: stage
        run: |
          mv apks/apk-arm64-v8a/app-release.apk apks/syncup-${{ steps.version.outputs.version }}-arm64-v8a.apk
          mv apks/apk-x86_64/app-release.apk    apks/syncup-${{ steps.version.outputs.version }}-x86_64.apk
          mv apks/versioncode/VERSIONCODE       apks/VERSIONCODE
          VC=$(cat apks/VERSIONCODE)
          echo "arm64-v8a versionCode: $VC"
          echo "versioncode=$VC" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            arm64-v8a versionCode (for F-Droid reproducible-build metadata):
            `${{ steps.stage.outputs.versioncode }}`
          append_body: true
          draft: true
          generate_release_notes: true
          files: |
            apks/syncup-*.apk
            apks/VERSIONCODE
