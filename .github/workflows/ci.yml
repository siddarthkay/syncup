name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.25'
  JAVA_VERSION: '17'

jobs:
  lint-and-typecheck:
    name: lint + typecheck + go vet
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Lint and typecheck
        run: |
          cd mobile-app && yarn install --immutable && yarn lint && yarn typecheck
          cd ../backend && go vet -tags noassets ./...

  android:
    name: android build
    runs-on: [self-hosted, linux]
    needs: lint-and-typecheck
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Nix (via flake.nix) provides Go, Node/corepack, JDK, Gradle, gomake.
      # Android SDK/NDK are not in the flake — install them here.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-36 build-tools;36.0.0 ndk;26.1.10909125'

      - name: Build Android APK (via nix)
        run: make android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: mobile-app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14

  ios:
    name: ios build
    runs-on: [self-hosted, macOS]
    needs: lint-and-typecheck
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Nix provides Go, Node, CocoaPods, etc. via flake.nix.
      # Xcode must be pre-installed on the runner.
      - name: Clean stale build state
        run: make clean

      - name: Build iOS app (via nix)
        run: make ios

      - name: Upload simulator app
        uses: actions/upload-artifact@v4
        with:
          name: syncup-${{ github.sha }}
          path: mobile-app/ios/build/Build/Products/Release-iphonesimulator/syncup.app
          if-no-files-found: error
          retention-days: 14
